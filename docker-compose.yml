services:
  db:
    image: postgres:16-alpine
    container_name: cre-ai-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cre_ai}
      POSTGRES_USER: ${POSTGRES_USER:-cre_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cre_ai_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cre_ai} -d ${POSTGRES_DB:-cre_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: cre-ai-backend
    env_file:
      - path: .env
        required: false
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./ai:/app/ai

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: cre-ai-frontend
    environment:
      API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules

volumes:
  postgres_data:
